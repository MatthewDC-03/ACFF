<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Existing Credentials</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .results {
            margin-top: 30px;
            display: none;
        }
        
        .results.show {
            display: block;
        }
        
        .results h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 18px;
        }
        
        .user-card {
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
        }
        
        .user-card p {
            margin: 8px 0;
            color: #333;
            font-size: 14px;
        }
        
        .user-card strong {
            color: #667eea;
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            display: none;
        }
        
        .error.show {
            display: block;
        }
        
        .loading {
            text-align: center;
            color: #667eea;
            display: none;
            margin-top: 20px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196F3;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            font-size: 14px;
            color: #1565c0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Get Existing Credentials</h1>
        <p class="subtitle">Fetch all users from MongoDB Atlas</p>
        
        <div class="info-box">
            <strong>ℹ️ How to use:</strong><br>
            1. Enter your API URL (e.g., http://localhost:4000 or your deployed URL)<br>
            2. Click "Fetch Users"<br>
            3. All existing users will be displayed below
        </div>
        
        <div class="input-group">
            <label for="apiUrl">API URL:</label>
            <input 
                type="text" 
                id="apiUrl" 
                placeholder="e.g., http://localhost:4000 or https://acff-api.vercel.app"
                value="http://localhost:4000"
            >
        </div>
        
        <button onclick="fetchUsers()">Fetch Users</button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Fetching users...</p>
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="results" id="results">
            <h2>📋 Existing Users</h2>
            <div id="usersList"></div>
        </div>
    </div>

    <script>
        async function fetchUsers() {
            const apiUrl = document.getElementById('apiUrl').value.trim();
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const results = document.getElementById('results');
            const usersList = document.getElementById('usersList');
            
            // Reset UI
            error.classList.remove('show');
            results.classList.remove('show');
            loading.classList.add('show');
            
            // Validate URL
            if (!apiUrl) {
                showError('Please enter an API URL');
                return;
            }
            
            try {
                const response = await fetch(`${apiUrl}/api/user/admin/all-users`);
                const data = await response.json();
                
                loading.classList.remove('show');
                
                if (!response.ok) {
                    showError(data.error || data.message || 'Failed to fetch users');
                    return;
                }
                
                if (data.count === 0) {
                    showError('No users found in the database. Please register a new account first.');
                    return;
                }
                
                // Display users
                usersList.innerHTML = '';
                data.users.forEach((user, index) => {
                    const userCard = document.createElement('div');
                    userCard.className = 'user-card';
                    userCard.innerHTML = `
                        <p><strong>User ${index + 1}:</strong></p>
                        <p><strong>Username:</strong> ${user.username}</p>
                        <p><strong>Email:</strong> ${user.email}</p>
                        <p><strong>ID:</strong> ${user.id}</p>
                        <p><strong>Type:</strong> ${user.type}</p>
                        <p><strong>Created:</strong> ${new Date(user.createdAt).toLocaleString()}</p>
                    `;
                    usersList.appendChild(userCard);
                });
                
                results.classList.add('show');
            } catch (err) {
                loading.classList.remove('show');
                showError(`Error: ${err.message}. Make sure the API URL is correct and the server is running.`);
            }
        }
        
        function showError(message) {
            const error = document.getElementById('error');
            error.textContent = message;
            error.classList.add('show');
        }
        
        // Allow Enter key to fetch
        document.getElementById('apiUrl').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                fetchUsers();
            }
        });
    </script>
</body>
</html>
